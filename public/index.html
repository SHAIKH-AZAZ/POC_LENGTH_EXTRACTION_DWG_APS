<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>APS Measure Viewer</title>

    <link rel="stylesheet"
        href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.min.css"/>

    <style>
        *{ box-sizing:border-box; }

        body{
            margin:0;
            overflow:hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            background:#0f1623;
            color:#e5e7eb;
        }

        /* ───── Upload Panel ───── */
        #uploadPanel{
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            height:100vh;
            gap:28px;
            padding:20px;
        }

        .panel-title{
            font-size:24px;
            font-weight:700;
            color:#f3f4f6;
            margin:0;
            letter-spacing:0.3px;
        }

        .panel-sub{
            margin:0;
            font-size:14px;
            color:#6b7280;
        }

        /* Drop Box */
        .upload-box{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:14px;
            padding:36px 52px;
            border:2px dashed #2d3748;
            border-radius:12px;
            background:#151d2e;
            min-width:340px;
            transition:border-color 0.2s;
        }

        .upload-box.dragover{ border-color:#3b82f6; }

        #fileInput{ display:none; }

        .file-label{
            padding:10px 24px;
            background:#1e293b;
            border:1px solid #334155;
            border-radius:7px;
            font-size:14px;
            cursor:pointer;
            color:#cbd5e1;
            transition:background 0.2s, border-color 0.2s;
        }
        .file-label:hover{ background:#273449; border-color:#4b5563; }

        #fileName{ font-size:13px; color:#64748b; }
        #fileName.chosen{ color:#94a3b8; }

        #uploadBtn{
            padding:11px 32px;
            background:#2563eb;
            border:none;
            border-radius:7px;
            color:white;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:background 0.2s, opacity 0.2s;
            width:100%;
        }
        #uploadBtn:hover:not(:disabled){ background:#1d4ed8; }
        #uploadBtn:disabled{ opacity:0.45; cursor:not-allowed; }

        /* ───── Progress Steps ───── */
        #progressArea{
            display:none;
            flex-direction:column;
            align-items:center;
            gap:18px;
            width:340px;
        }

        .steps{
            display:flex;
            align-items:center;
            width:100%;
            justify-content:space-between;
        }

        .step{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:6px;
            flex:1;
            position:relative;
        }

        /* connector line between steps */
        .step:not(:last-child)::after{
            content:'';
            position:absolute;
            top:16px;
            left:calc(50% + 16px);
            width:calc(100% - 32px);
            height:2px;
            background:#1e293b;
            transition:background 0.4s;
        }

        .step.done:not(:last-child)::after{ background:#22c55e; }
        .step.active:not(:last-child)::after{ background:#3b82f6; }

        .step-icon{
            width:32px;
            height:32px;
            border-radius:50%;
            background:#1e293b;
            border:2px solid #334155;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:14px;
            transition:all 0.3s;
            position:relative;
        }

        .step.active .step-icon{
            border-color:#3b82f6;
            background:#1e3a5f;
            animation:pulse 1.4s ease-in-out infinite;
        }

        .step.done .step-icon{
            border-color:#22c55e;
            background:#14532d;
        }

        .step-label{
            font-size:11px;
            color:#6b7280;
            white-space:nowrap;
            transition:color 0.3s;
        }
        .step.active .step-label{ color:#60a5fa; }
        .step.done  .step-label{ color:#4ade80; }

        @keyframes pulse{
            0%,100%{ box-shadow:0 0 0 0 rgba(59,130,246,0.5); }
            50%     { box-shadow:0 0 0 6px rgba(59,130,246,0); }
        }

        /* spinner inside active icon */
        .spin{
            width:14px; height:14px;
            border:2px solid #3b82f6;
            border-top-color:transparent;
            border-radius:50%;
            animation:spin 0.7s linear infinite;
        }
        @keyframes spin{ to{ transform:rotate(360deg); } }

        /* Progress bar */
        .progress-bar-wrap{
            width:100%;
            height:6px;
            background:#1e293b;
            border-radius:4px;
            overflow:hidden;
        }
        .progress-bar-fill{
            height:100%;
            background:linear-gradient(90deg, #2563eb, #7c3aed);
            border-radius:4px;
            width:0%;
            transition:width 0.5s ease;
        }

        #statusMsg{
            font-size:13px;
            color:#60a5fa;
            min-height:18px;
            text-align:center;
        }
        #statusMsg.error{ color:#f87171; }

        /* ───── Viewer ───── */
        #viewerPanel{
            display:none;
            position:relative;
            width:100vw;
            height:100vh;
        }

        #viewer{ width:100%; height:100%; }

        .viewer-btn{
            position:absolute;
            top:20px;
            z-index:9999;
            padding:10px 18px;
            color:white;
            border:1px solid transparent;
            border-radius:4px;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:filter 0.2s;
        }
        .measure-btn{ left:20px; background:#374151; border-color:#2b3440; }
        .capture-btn{ left:150px; background:#4b5563; border-color:#3f4854; }
        .viewer-btn:hover { filter:brightness(0.96); }
        .viewer-btn:active{ filter:brightness(0.92); }
    </style>
</head>

<body>

<!-- ── Upload Panel ── -->
<div id="uploadPanel">
    <h2 class="panel-title">DWG Length Extraction</h2>
    <p class="panel-sub">Upload a DWG file to view and measure it.</p>

    <div class="upload-box" id="dropZone">
        <label class="file-label" for="fileInput">Choose DWG File</label>
        <input type="file" id="fileInput" accept=".dwg" />
        <span id="fileName">No file chosen</span>
        <button id="uploadBtn" disabled>Upload &amp; View</button>
    </div>

    <!-- Step progress (shown while working) -->
    <div id="progressArea">
        <div class="steps">
            <div class="step" id="step-upload">
                <div class="step-icon">⬆</div>
                <span class="step-label">Uploading</span>
            </div>
            <div class="step" id="step-process">
                <div class="step-icon">⚙</div>
                <span class="step-label">Processing</span>
            </div>
            <div class="step" id="step-convert">
                <div class="step-icon">🔄</div>
                <span class="step-label">Converting</span>
            </div>
            <div class="step" id="step-render">
                <div class="step-icon">🖼</div>
                <span class="step-label">Rendering</span>
            </div>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>

        <div id="statusMsg"></div>
    </div>
</div>

<!-- ── Viewer Panel ── -->
<div id="viewerPanel">
    <button id="measureBtn" class="viewer-btn measure-btn">Measure</button>
    <button id="captureBtn" class="viewer-btn capture-btn">Extract Length</button>
    <div id="viewer"></div>
</div>

<script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.min.js"></script>
<script src="/app.js"></script>

</body>
</html>
