<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>APS Measure Viewer</title>

    <link
        rel="stylesheet"
        href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.min.css"
    />

    <style>

        body{
            margin:0;
            overflow:hidden;
            font-family: Arial, Helvetica, sans-serif;
        }

        #viewer{
            width:100vw;
            height:100vh;
        }

        .viewer-btn{

            position:absolute;
            top:20px;

            z-index:9999;

            padding:10px 18px;
            color:white;

            border:1px solid transparent;
            border-radius:4px;

            font-size:15px;
            font-weight:600;

            cursor:pointer;

            box-shadow:none;
            transition:background-color 0.2s ease, border-color 0.2s ease;
        }

        .measure-btn{
            left:20px;
            background:#374151;
            border-color:#2b3440;
        }

        .capture-btn{
            left:150px;
            background:#4b5563;
            border-color:#3f4854;
        }

        .viewer-btn:hover{
            filter:brightness(0.96);
        }

        .viewer-btn:active{
            filter:brightness(0.92);
        }

    </style>
</head>

<body>

    <button id="measureBtn" class="viewer-btn measure-btn">
        Measure
    </button>

    <button id="captureBtn" class="viewer-btn capture-btn">
        Extract Length
    </button>

    <div id="viewer"></div>

    <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.min.js"></script>

    <script src="/app.js"></script>

</body>
</html>
